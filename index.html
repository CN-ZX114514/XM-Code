<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XM Code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        :root {
            --primary: #6c63ff;
            --secondary: #ff6584;
            --dark: #0f0f1e;
            --dark-light: #1a1a2e;
            --text: #f0f0f0;
            --text-light: #b0b0c0;
        }
        
        body {
            background-color: var(--dark);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(108, 99, 255, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 101, 132, 0.1) 0%, transparent 20%);
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 头部样式 */
        header {
            padding: 30px 0;
            position: relative;
            z-index: 10;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo-icon {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        /* 主要内容 */
        .hero {
            padding: 60px 0 100px;
            text-align: center;
            position: relative;
        }
        
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
            background: linear-gradient(90deg, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 3s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(108, 99, 255, 0.3); }
            to { text-shadow: 0 0 20px rgba(108, 99, 255, 0.6), 0 0 30px rgba(255, 101, 132, 0.3); }
        }
        
        .hero p {
            font-size: 1.2rem;
            color: var(--text-light);
            max-width: 700px;
            margin: 0 auto 40px;
        }
        
        /* 复制区域 */
        .copy-section {
            background-color: var(--dark-light);
            border-radius: 20px;
            padding: 30px;
            margin: 40px auto;
            max-width: 800px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(108, 99, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .copy-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        
        .copy-section h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .copy-section h2 i {
            color: var(--primary);
        }
        
        .copy-box {
            display: flex;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .copy-text {
            flex-grow: 1;
            padding: 18px 20px;
            font-size: 1.1rem;
            word-break: break-all;
            background-color: rgba(0, 0, 0, 0.2);
        }
        
        .copy-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .copy-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        .copy-btn.copied {
            background: linear-gradient(45deg, #4CAF50, #2E7D32);
        }
        
        /* 特性部分 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin: 60px 0;
        }
        
        .feature {
            background-color: var(--dark-light);
            border-radius: 16px;
            padding: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .feature:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(108, 99, 255, 0.3);
        }
        
        .feature-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), rgba(108, 99, 255, 0.3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        
        .feature h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        
        .feature p {
            color: var(--text-light);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .copy-box {
                flex-direction: column;
            }
            
            .copy-text {
                padding: 15px;
            }
            
            .copy-btn {
                padding: 15px;
                justify-content: center;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }
            
            .hero p {
                font-size: 1rem;
            }
            
            .copy-section {
                padding: 20px;
            }
            
            .copy-section h2 {
                font-size: 1.5rem;
            }
        }
        
        /* 浮动元素 */
        .floating {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            opacity: 0.1;
            z-index: 1;
        }
        
        .float-1 {
            top: 10%;
            left: 5%;
            width: 80px;
            height: 80px;
            animation: float 20s infinite linear;
        }
        
        .float-2 {
            top: 60%;
            right: 10%;
            width: 60px;
            height: 60px;
            animation: float 15s infinite linear reverse;
        }
        
        .float-3 {
            bottom: 20%;
            left: 10%;
            width: 40px;
            height: 40px;
            animation: float 25s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(90deg); }
            50% { transform: translateY(0) rotate(180deg); }
            75% { transform: translateY(20px) rotate(270deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 30px 0;
            color: var(--text-light);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 40px;
        }
        
        /* 提示消息 */
        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s ease;
            z-index: 1000;
        }
        
        .message.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 浮动背景元素 -->
    <div class="floating float-1"></div>
    <div class="floating float-2"></div>
    <div class="floating float-3"></div>
    
    <!-- 头部 -->
    <header>
        <div class="container">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-gem"></i>
                </div>
                <span>XM Code</span>
            </div>
        </div>
    </header>
    
    <!-- 主要内容 -->
    <main>
        <section class="hero">
            <div class="container">
                <h1>XM Code</h1>
                <p>Roblox脚本</p>
                
                <!-- 复制区域 -->
                <div class="copy-section">
                    <h2><i class="fas fa-copy"></i> 复制文本示例</h2>
                    <p>点击右侧按钮即可复制下方文本到剪贴板，然后可以在任何地方粘贴使用。</p>
                    
                    <div class="copy-box">
                        <div class="copy-text" id="copyText">
                            并没有脚本
                        </div>
                        <button class="copy-btn" id="copyBtn">
                            <i class="fas fa-copy"></i> 复制文本
                        </button>
                    </div>
                    
                    <p style="margin-top: 15px; font-size: 0.9rem; color: var(--text-light);">
                        <i class="fas fa-info-circle"></i> 点击上方按钮后，您可以在任何输入框中粘贴(Ctrl+V)这段文本
                    </p>
                </div>
            </div>
        </section>
        
        <!-- 特性介绍 -->
        <section class="container">
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">
                        <i class=>XM</i>
                    </div>
                    <h3>缝合脚本</h3>
                    <p>开源且免费版本loadstring(game:HttpGet("lua"))()</p>
                </div>
                
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-code"></i>
                    </div>
                    <h3>更新公告</h3>
                    <p>更新了</p>
                </div>
                
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <h3>快速加载</h3>
                    <p>优化了XM代码结构和资源</p>
                </div>
            </div>
        </section>
    </main>
    
    <!-- 页脚 -->
    <footer>
        <div class="container">
                <p>😈</p>
                <p style="margin-top: 5px;">网站更新日期是2026年4月10日星期五</p>
            </div>
    </footer>
    
    <!-- 提示消息 -->
    <div class="message" id="message">
        <i class="fas fa-check-circle"></i>
        <span>文本已成功复制到剪贴板！</span>
    </div>

    <script>
        // 复制文本功能
        const copyBtn = document.getElementById('copyBtn');
        const copyText = document.getElementById('copyText');
        const message = document.getElementById('message');
        
        copyBtn.addEventListener('click', async () => {
            try {
                // 使用现代剪贴板API
                await navigator.clipboard.writeText(copyText.textContent);
                
                // 更新按钮状态
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                copyBtn.classList.add('copied');
                
                // 显示提示消息
                message.classList.add('show');
                
                // 3秒后恢复按钮状态
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.classList.remove('copied');
                }, 3000);
                
                // 5秒后隐藏提示消息
                setTimeout(() => {
                    message.classList.remove('show');
                }, 5000);
                
            } catch (err) {
                // 如果剪贴板API失败，使用备用方法
                const textArea = document.createElement('textarea');
                textArea.value = copyText.textContent;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                // 显示成功消息
                message.innerHTML = '<i class="fas fa-check-circle"></i><span>文本已成功复制到剪贴板！</span>';
                message.classList.add('show');
                
                // 更新按钮状态
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                copyBtn.classList.add('copied');
                
                // 3秒后恢复按钮状态
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.classList.remove('copied');
                }, 3000);
                
                // 5秒后隐藏提示消息
                setTimeout(() => {
                    message.classList.remove('show');
                }, 5000);
            }
        });
        
        // 添加一些交互效果
        document.querySelectorAll('.feature').forEach(feature => {
            feature.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-10px)';
            });
            
            feature.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });
        
        // 页面加载动画
        window.addEventListener('load', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
